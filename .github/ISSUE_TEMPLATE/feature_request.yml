name: Feature request
description: Suggest new functionality or an API improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that is currently hard or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe how you would like the feature to work.
    validations:
      required: true
  - type: textarea
    id: api-example
    attributes:
      label: Proposed API example
      description: Optionally sketch the API as a short Python example.
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
