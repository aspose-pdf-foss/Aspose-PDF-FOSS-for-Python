name: Security Audit

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project dependencies and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[images,woff2]'
          python -m pip install pip-audit==2.10.1

      - name: Audit installed dependencies
        run: |
          python -m pip_audit \
            --local \
            --skip-editable \
            --cache-dir "${{ runner.temp }}/pip-audit-cache" \
            --progress-spinner off
